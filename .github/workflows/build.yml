name: Build

on:
  workflow_dispatch:

permissions:
  contents: write


jobs:

  sort:
  
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install depedencies
      run: |
        sudo apt install git devscripts build-essential debhelper dh-make pbuilder fakeroot lintian sbuild
    - name: Fetch Chromium Debian Source
      run: |
        git init
        git remote add upstream https://salsa.debian.org/chromium-team/chromium.git
        git remote add origin https://github.com/arfshl/chromium-ubuntu-deb.git
        git fetch upstream master
        git push origin upstream/master:debian --force
    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Auto-build"
        git push
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
